<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน – UniQueue</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #FDF6EC; padding: 20px; color: #2C1810; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #C8522A; text-align: center; }
        .order-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .total-price { font-size: 1.5rem; font-weight: 700; color: #C8522A; text-align: center; margin: 20px 0; }
        .btn { display: block; width: 100%; background: #C8522A; color: white; padding: 15px; border-radius: 10px; text-align: center; text-decoration: none; font-weight: 600; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ยืนยันการชำระเงิน</h1>
        <div id="paymentDetails">กำลังโหลดรายการของร้านค้า...</div>
        <div class="total-price" id="totalDisplay">฿0</div>
        <button class="btn" onclick="alert('ระบบชำระเงินจำลอง: ดำเนินการเสร็จสิ้น!')">ยืนยันโอนเงิน</button>
        <button class="btn" style="background:#9C8070; margin-top:10px;" onclick="history.back()">กลับไปแก้ไข</button>
    </div>

    <script>
        const CART_KEY = 'uniQueueCart';
        const params = new URLSearchParams(window.location.search);
        const targetShopId = params.get('shopId');
        
        function loadPaymentInfo() {
            const cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
            const shopItems = cart.filter(item => item.shopId == targetShopId);
            
            if (shopItems.length === 0) {
                document.getElementById('paymentDetails').innerHTML = "ไม่พบรายการของร้านนี้";
                return;
            }

            let html = `<h3>ร้าน: ${shopItems[0].shopName}</h3>`;
            let total = 0;
            shopItems.forEach(item => {
                total += (item.price * item.qty);
                html += `<div class="order-item"><span>${item.menu} x ${item.qty}</span> <span>฿${item.price * item.qty}</span></div>`;
            });
            
            document.getElementById('paymentDetails').innerHTML = html;
            document.getElementById('totalDisplay').textContent = "ยอดรวม: ฿" + total;
        }

        loadPaymentInfo();
    </script>
</body>
</html>
