<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน – UniQueue</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #FDF6EC; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #C8522A; }
        .btn { display: inline-block; background: #C8522A; color: white; padding: 12px 24px; border-radius: 10px; text-decoration: none; margin-top: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>💳 ชำระเงิน</h1>
        <p>คุณกำลังชำระเงินสำหรับร้านค้า: <span id="shopList"></span></p>
        <p>กรุณาโอนเงินตามยอดรวมที่แสดงในตะกร้า</p>
        <button class="btn" onclick="window.history.back()">กลับไปที่ตะกร้า</button>
    </div>

    <script>
        // ดึงข้อมูลร้านค้าจาก URL มาแสดงผล
        const params = new URLSearchParams(window.location.search);
        const shops = params.get('shops');
        if (shops) {
            document.getElementById('shopList').textContent = shops;
        } else {
            document.getElementById('shopList').textContent = "ไม่พบข้อมูลร้านค้า";
        }
    </script>
</body>
</html>
