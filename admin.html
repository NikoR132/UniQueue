<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniQueue Admin – ระบบบริหารจัดการกลาง</title>
<style>
    :root { --cream: #FDF6EC; --ink: #2C1810; --red: #E63946; --green: #2A9D8F; }
    body { font-family: sans-serif; background: var(--cream); color: var(--ink); display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: #E8D5BC; padding: 20px; }
    .main-content { flex: 1; padding: 40px; }
    .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .card { background: white; padding: 20px; border-radius: 10px; border: 1px solid #ddd; text-align: center; }
    .data-table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
    th, td { padding: 12px; border: 1px solid #ddd; }
    .btn-logout { color: var(--red); cursor: pointer; margin-top: 50px; font-weight: bold; }
</style>
</head>
<body>

<div class="sidebar">
    <h3>Admin Menu</h3>
    <p style="cursor:pointer; margin: 20px 0;" onclick="showSection('dashboard')">📊 แดชบอร์ด</p>
    <p style="cursor:pointer; margin: 20px 0;" onclick="showSection('vendors')">🏢 จัดการร้านค้า</p>
    <p style="cursor:pointer; margin: 20px 0;" onclick="showSection('users')">👥 จัดการผู้ใช้</p>
    <div class="btn-logout" onclick="logout()">🚪 ออกจากระบบ</div>
</div>

<div class="main-content">
    <div id="dashboard" class="admin-section">
        <h2>ภาพรวมระบบ</h2>
        <div class="dashboard">
            <div class="card"><h3>ร้านค้าทั้งหมด</h3><p id="shopCount">0</p></div>
            <div class="card"><h3>ผู้ใช้งาน</h3><p id="userCount">0</p></div>
            <div class="card"><h3>สถานะระบบ</h3><p style="color:var(--green)">ปกติ</p></div>
        </div>
    </div>

    <div id="vendors" class="admin-section" style="display:none;">
        <h2>จัดการร้านค้า</h2>
        <table class="data-table"><thead><tr><th>ชื่อร้าน</th><th>สถานะ</th><th>จัดการ</th></tr></thead><tbody id="vendorTableBody"></tbody></table>
    </div>

    <div id="users" class="admin-section" style="display:none;">
        <h2>จัดการผู้ใช้ (นักศึกษา)</h2>
        <table class="data-table">
            <thead><tr><th>UID</th><th>ชื่อผู้ใช้</th><th>สถานะ</th></tr></thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</div>

<script>
  function showSection(id) {
    document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
  }

  function logout() {
    if(confirm("ออกจากระบบใช่หรือไม่?")) window.location.href = 'index.html';
  }

  // ตัวอย่างฟังก์ชันดึงข้อมูลจาก Firestore (คุณต้องเติมโค้ด Firebase ของคุณในนี้)
  async function loadDashboardData() {
    // ตรงนี้ใช้ getDocs หรือ onSnapshot เพื่อไปนับจำนวน doc ใน collection ร้านค้าและผู้ใช้
    // แล้วใช้ document.getElementById('shopCount').innerText = ... อัปเดตตัวเลขครับ
  }
  
  loadDashboardData();
</script>
</body>
</html>
