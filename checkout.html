<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniQueue – ตะกร้าและจ่ายเงิน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --cream: #FDF6EC; --terra: #C8522A; --terra-dk: #A8391A; --ink: #2C1810; --white: #FFFFFF; --r: 18px; }
body { font-family: 'Sarabun', sans-serif; background: var(--cream); color: var(--ink); padding-bottom: 40px; }
.hero { background: var(--terra); padding: 40px 20px 60px; text-align: center; color: white; }
.wrap { max-width: 500px; margin: -32px auto 0; padding: 0 16px; position: relative; }
.shop-section { background: var(--white); border-radius: var(--r); padding: 16px; margin-bottom: 16px; border: 1px solid #E8D5BC; }
.shop-section-title { font-weight: 700; color: var(--terra); margin-bottom: 12px; border-bottom: 2px solid var(--terra); padding-bottom: 8px; }
.shop-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; }
.btn-pay { background: var(--terra); color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 12px; }
.btn-pay:hover { background: var(--terra-dk); }
.btn-clear { background: none; border: 1px solid #E8D5BC; color: #9C8070; padding: 10px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; }
</style>
</head>
<body>

<div class="hero"><h1>🛒 ตะกร้าของฉัน</h1></div>

<div class="wrap">
    <div id="cartContainer"></div>
    <button class="btn-clear" onclick="clearCart()">🗑️ ล้างตะกร้าทั้งหมด</button>
</div>

<script>
const CART_KEY = 'uniQueueCart';

function renderCart() {
    const cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
    const container = document.getElementById('cartContainer');
    
    if (cart.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px;">ตะกร้ายังไม่มีรายการอาหาร</div>';
        return;
    }

    // จัดกลุ่มรายการตาม shopId
    const shopGroups = {};
    cart.forEach(item => {
        if (!shopGroups[item.shopId]) {
            shopGroups[item.shopId] = { shopName: item.shopName, items: [], total: 0 };
        }
        shopGroups[item.shopId].items.push(item);
        shopGroups[item.shopId].total += (item.price * item.qty);
    });

    // สร้าง HTML แยกตามร้านค้า
    let html = '';
    for (let shopId in shopGroups) {
        const shop = shopGroups[shopId];
        html += `<div class="shop-section">
            <div class="shop-section-title">🏪 ${shop.shopName}</div>
            ${shop.items.map(item => `
                <div class="shop-item">
                    <span>${item.menu} x ${item.qty}</span>
                    <span>฿${item.price * item.qty}</span>
                </div>
            `).join('')}
            <div style="margin-top:10px; font-weight:700; text-align:right; color:var(--terra);">รวม: ฿${shop.total}</div>
            <button class="btn-pay" onclick="payForShop('${shopId}')">💳 ชำระเงินร้าน ${shop.shopName}</button>
        </div>`;
    }
    container.innerHTML = html;
}

function payForShop(shopId) {
    // ส่ง shopId ไปที่หน้า payment เพื่อให้หน้านั้นไปกรองข้อมูลเอง
    window.location.href = `payment.html?shopId=${shopId}`;
}

function clearCart() {
    if (confirm('ต้องการล้างตะกร้าทั้งหมดใช่หรือไม่?')) {
        localStorage.removeItem(CART_KEY);
        renderCart();
    }
}

renderCart();
</script>
</body>
</html>
